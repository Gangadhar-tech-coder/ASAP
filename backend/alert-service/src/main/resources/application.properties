server.port=8082
spring.application.name=alert-service

# Database Configuration (H2 In-Memory for development)
spring.datasource.url=jdbc:h2:mem:alertdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update

# JWT Configuration (Must match auth-service)
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

# Mail Configuration (Using Mailtrap or Dummy)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=mock_user
spring.mail.password=mock_pass
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
